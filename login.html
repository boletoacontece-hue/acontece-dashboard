<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Acontece Imobiliária</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
            background:linear-gradient(135deg,#1a4d1b 0%,#2c6e2e 100%);
            min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
        }
        .login-container{
            background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);
            width:100%;max-width:450px;padding:50px 40px;animation:slideUp .5s ease-out;
        }
        @keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
        .logo-section{text-align:center;margin-bottom:40px;}
        .logo{max-width:180px;height:auto;margin-bottom:20px;}
        .login-title{font-size:28px;font-weight:700;color:#212121;margin-bottom:8px;}
        .login-subtitle{font-size:15px;color:#757575;}
        .form-group{margin-bottom:24px;}
        .form-label{display:block;font-size:14px;font-weight:600;color:#424242;margin-bottom:8px;}
        .form-input{
            width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:10px;
            font-size:15px;transition:all .2s;background:#fafafa;
        }
        .form-input:focus{outline:none;border-color:#2c6e2e;background:#fff;}
        .form-checkbox{display:flex;align-items:center;gap:8px;margin-bottom:24px;}
        .form-checkbox input{width:18px;height:18px;cursor:pointer;}
        .form-checkbox label{font-size:14px;color:#616161;cursor:pointer;}
        .btn-login{
            width:100%;padding:16px;background:#2c6e2e;color:#fff;border:none;border-radius:10px;
            font-size:16px;font-weight:600;cursor:pointer;transition:all .3s;
        }
        .btn-login:hover{background:#1a4d1b;transform:translateY(-2px);box-shadow:0 8px 20px rgba(44,110,46,.3);}
        .btn-login:active{transform:translateY(0);}
        .error-message{
            background:#ffebee;color:#c62828;padding:12px 16px;border-radius:8px;font-size:14px;
            margin-bottom:20px;display:none;border-left:4px solid #c62828;
        }
        .error-message.show{display:block;animation:shake .3s;}
        @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-10px);}75%{transform:translateX(10px);}}
        .loading{
            display:none;width:20px;height:20px;border:3px solid #f3f3f3;border-top:3px solid #fff;
            border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;
        }
        @keyframes spin{0%{transform:rotate(0);}100%{transform:rotate(360deg);}}
        .btn-login.loading{pointer-events:none;opacity:.7;}
        @media(max-width:480px){
            .login-container{padding:40px 30px;}
            .login-title{font-size:24px;}
            .logo{max-width:140px;}
        }
        
        /* Mobile Extra Small */
        @media(max-width:360px){
            .login-container{padding:30px 20px;}
            .login-title{font-size:20px;}
            .form-input{padding:12px 14px;font-size:14px;}
            .btn-login{padding:14px;font-size:15px;}
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <img src="Logo01.png" alt="Acontece Imobiliária" class="logo" onerror="this.style.display='none'">
            <h1 class="login-title">Bem-vindo</h1>
            <p class="login-subtitle">Dashboard de Vendas</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">E-mail</label>
                <input type="email" id="email" class="form-input"
                       placeholder="seu.email@acontece.com.br" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Senha</label>
                <input type="password" id="password" class="form-input"
                       placeholder="Digite sua senha" autocomplete="current-password" required>
            </div>
            <div class="form-checkbox">
                <input type="checkbox" id="rememberMe" checked>
                <label for="rememberMe">Manter conectado</label>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <span id="loginBtnText">Entrar</span>
                <div class="loading" id="loginLoading"></div>
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db-supabase.js"></script>
    <script src="controle-acesso.js"></script>
    <script>
        // Se já estiver logado, vai direto pro dashboard
        (async () => {
            const session = await DB.getSession();
            if (session) window.location.href = 'Dash5.html';
        })();

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const btn = document.getElementById('loginBtn');
            const txt = document.getElementById('loginBtnText');
            const ld  = document.getElementById('loginLoading');

            btn.classList.add('loading'); txt.style.display='none'; ld.style.display='block';
            errorDiv.classList.remove('show');

            try {
                await DB.signIn(email, password);
                window.location.href = 'Dash5.html';
            } catch (err) {
                let msg = 'Não foi possível entrar. Verifique e-mail e senha.';
                if (err && /Invalid login/i.test(err.message)) msg = 'E-mail ou senha incorretos.';
                if (err && /Email not confirmed/i.test(err.message)) msg = 'E-mail ainda não confirmado.';
                errorDiv.textContent = msg;
                errorDiv.classList.add('show');
                btn.classList.remove('loading'); txt.style.display='block'; ld.style.display='none';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', handleLogin);
    </script>
</body>
</html>
