<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2B5C2B">
    <title>Registrar Visita | Acontece Imóveis</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Visitas">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2c6e2e;
            --primary-dark: #1a4d1b;
            --success: #27ae60;
            --danger: #c62828;
            --warning: #f39c12;
            --dark: #212121;
            --light: #f4f6f4;
            --borda: #e0e0e0;
            --white: #ffffff;
            --gray: #9e9e9e;
            --gray-light: #bdc3c7;
            --shadow: rgba(0, 0, 0, 0.08);
            --radius: 10px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--light);
            min-height: 100vh;
            color: var(--dark);
            padding: 24px;
            padding-bottom: 80px;
        }

        /* ===== HEADER ===== */
        .topbar {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            border-radius: 16px 16px 0 0;
            padding: 24px 32px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 10px var(--shadow);
        }

        .topbar h1 {
            font-size: 21px;
            font-weight: 700;
        }

        .topbar p {
            font-size: 13px;
            opacity: .85;
            margin-top: 2px;
        }

        .btn-historico {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-historico:hover {
            background: rgba(255, 255, 255, 0.28);
        }

        /* ===== CONTAINER PRINCIPAL ===== */
        .wrap {
            max-width: 860px;
            margin: 0 auto;
        }

        .card {
            background: #fff;
            border-radius: 0 0 16px 16px;
            box-shadow: 0 12px 40px var(--shadow);
            padding: 32px;
            margin-bottom: 20px;
        }

        /* ===== FORMULÁRIO ===== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #424242;
            margin-bottom: 7px;
        }

        .form-group label .required {
            color: var(--danger);
        }

        .form-control {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid var(--borda);
            border-radius: var(--radius);
            font-size: 15px;
            background: #fafafa;
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
        }

        .form-control:disabled {
            background: #eee;
            color: #777;
            cursor: not-allowed;
        }

        textarea.form-control {
            min-height: 80px;
            resize: vertical;
        }

        .hint {
            display: block;
            color: #9e9e9e;
            font-size: 12px;
            margin-top: 5px;
        }

        /* ===== Autocomplete ===== */
        .autocomplete-wrapper {
            position: relative;
        }

        .autocomplete-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #2c6e2e;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            max-height: 320px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            animation: slideDown 0.2s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .autocomplete-results {
            padding: 4px;
        }
        
        .autocomplete-item {
            padding: 12px 14px;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 2px;
            transition: all 0.15s;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .autocomplete-item:last-child {
            border-bottom: none;
        }
        
        .autocomplete-item:hover {
            background: #e8f5e9;
            transform: translateX(4px);
        }
        
        .autocomplete-item-code {
            font-weight: 700;
            color: #2c6e2e;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .autocomplete-item-address {
            font-size: 13px;
            color: #616161;
            line-height: 1.4;
        }
        
        .autocomplete-item-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 4px;
        }
        
        .autocomplete-item-status.disponivel {
            background: #e8f5e9;
            color: #2c6e2e;
        }
        
        .autocomplete-item-status.vendido {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .autocomplete-item-status.suspenso {
            background: #fff3e0;
            color: #f57c00;
        }
        
        .autocomplete-group {
            padding: 8px 14px;
            background: #fafafa;
            font-size: 11px;
            font-weight: 700;
            color: #2c6e2e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        
        .autocomplete-empty {
            padding: 20px;
            text-align: center;
            color: #9e9e9e;
            font-size: 14px;
        }
        
        .autocomplete-loading {
            padding: 20px;
            text-align: center;
            color: #2c6e2e;
            font-size: 14px;
        }
        
        /* Highlight do termo buscado */
        .highlight {
            background: #fff59d;
            font-weight: 700;
            padding: 0 2px;
        }
        
        /* Scroll customizado */
        .autocomplete-dropdown::-webkit-scrollbar {
            width: 8px;
        }
        
        .autocomplete-dropdown::-webkit-scrollbar-track {
            background: #f5f5f5;
            border-radius: 4px;
        }
        
        .autocomplete-dropdown::-webkit-scrollbar-thumb {
            background: #2c6e2e;
            border-radius: 4px;
        }
        
        .autocomplete-dropdown::-webkit-scrollbar-thumb:hover {
            background: #1a4d1b;
        }

        .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--gray-light);
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--dark);
        }

        .autocomplete-hint {
            font-size: 12px;
            color: var(--gray);
            margin-top: 4px;
        }

        /* Informações do imóvel selecionado */
        .imovel-info {
            background: var(--light);
            border-radius: var(--radius);
            padding: 16px;
            margin-top: 12px;
            display: none;
        }

        .imovel-info.show {
            display: block;
        }

        .imovel-info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .imovel-info-row:last-child {
            margin-bottom: 0;
        }

        .imovel-info-label {
            color: var(--gray);
            font-weight: 600;
        }

        .imovel-info-value {
            color: var(--dark);
            font-weight: 700;
        }

        /* ===== BOTÕES ===== */
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 8px;
            border-top: 1px solid #f0f0f0;
            padding-top: 22px;
        }

        .btn {
            padding: 14px 26px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(44, 110, 46, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-ghost {
            background: #f0f0f0;
            color: #424242;
        }

        .btn-ghost:hover {
            background: #e4e4e4;
        }

        .btn-whatsapp {
            background: #25D366;
            color: #fff;
            display: none;
            margin-top: 16px;
            width: 100%;
            justify-content: center;
        }

        .btn-whatsapp.show {
            display: flex;
        }

        .btn-whatsapp:hover:not(:disabled) {
            background: #128C7E;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
        }

        /* ===== LOADING ===== */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .loading.show {
            display: flex;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark);
            color: var(--white);
            padding: 16px 24px;
            border-radius: var(--radius);
            box-shadow: 0 4px 20px var(--shadow);
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 9998;
            max-width: 90%;
        }

        .toast.show {
            display: flex;
            animation: slideUp 0.3s ease-out;
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger);
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            body {
                padding: 12px;
                padding-bottom: 90px;
            }

            .wrap {
                padding: 0;
            }

            .topbar {
                padding: 16px 20px;
                border-radius: 12px 12px 0 0;
            }

            .topbar h1 {
                font-size: 18px;
            }

            .topbar p {
                font-size: 12px;
            }

            .card {
                padding: 20px;
            }

            .actions {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 320px;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
                padding-bottom: 85px;
            }

            .topbar h1 {
                font-size: 16px;
            }

            .card {
                padding: 16px;
            }

            .btn-historico span {
                display: none;
            }
        }
    </style>
    <script src="pwa-register.js" defer></script>
</head>
<body>
    <!-- LOADING -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Mensagem</span>
    </div>

    <!-- HEADER -->
    <div class="wrap">
        <div class="topbar">
            <div>
                <h1>Registrar Visita</h1>
                <p>Sistema de Solicitação de Visitas</p>
            </div>
            <a href="Visitas.html" class="btn-historico">
                <i class="fas fa-history"></i>
                <span>Histórico</span>
            </a>
        </div>

        <!-- FORMULÁRIO -->
        <div class="card">
            <form id="formVisita">
                <!-- Cliente -->
                <div class="form-group">
                    <label>
                        Nome do Cliente
                        <span class="required">*</span>
                    </label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="clienteNome" 
                        placeholder="Ex: Maria Silva"
                        required
                        autocomplete="name"
                    >
                </div>

                <!-- Imóvel (Autocomplete) -->
                <div class="form-group">
                    <label>
                        Imóvel para Visitar
                        <span class="required">*</span>
                    </label>
                    <div class="autocomplete-wrapper">
                        <input 
                            type="text" 
                            class="form-control" 
                            id="autocompleteInput" 
                            placeholder="Digite o código ou endereço..."
                            autocomplete="off"
                            required
                            oninput="handleAutocompleteInput()"
                            onfocus="handleAutocompleteFocus()"
                        >
                        <button type="button" class="clear-btn" id="clearBtn" onclick="limparAutocomplete()">
                            <i class="fas fa-times"></i>
                        </button>
                        <div class="autocomplete-dropdown" id="autocompleteDropdown">
                            <div class="autocomplete-results" id="autocompleteResults"></div>
                        </div>
                        <span class="autocomplete-hint" id="autocompleteHint">Digite pelo menos 2 caracteres para buscar</span>
                    </div>
                    <input type="hidden" id="imovelCodigo" required>
                    <div class="imovel-info" id="imovelInfo"></div>
                </div>

                <!-- Data da Visita -->
                <div class="form-group">
                    <label>
                        Data da Visita
                        <span class="required">*</span>
                    </label>
                    <input 
                        type="date" 
                        class="form-control" 
                        id="dataVisita" 
                        required
                    >
                </div>

                <!-- Horário da Visita -->
                <div class="form-group">
                    <label>
                        Horário da Visita
                        <span class="required">*</span>
                    </label>
                    <input 
                        type="time" 
                        class="form-control" 
                        id="horarioVisita" 
                        required
                    >
                </div>

                <!-- Observações -->
                <div class="form-group">
                    <label>
                        Observações
                    </label>
                    <textarea 
                        class="form-control" 
                        id="observacoes" 
                        placeholder="Observações adicionais (opcional)"
                    ></textarea>
                </div>

                <!-- Botões -->
                <div class="actions">
                    <button type="button" class="btn btn-ghost" id="btnLimpar">
                        <i class="fas fa-eraser"></i>
                        Limpar
                    </button>
                    <button type="submit" class="btn btn-primary" id="btnSalvar">
                        <i class="fas fa-save"></i>
                        Salvar Visita
                    </button>
                </div>

                <!-- Botão WhatsApp (aparece após salvar) -->
                <button type="button" class="btn btn-whatsapp" id="btnWhatsApp">
                    <i class="fab fa-whatsapp"></i>
                    Enviar para WhatsApp
                </button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db-supabase.js"></script>
    <script>
        // ===== VARIÁVEIS GLOBAIS =====
        let imoveisCache = [];
        let imovelSelecionado = null;
        let visitaSalva = null;
        let currentUser = null;
        let currentCorretor = null; // Dados completos do corretor

        // ===== INICIALIZAÇÃO =====
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await DB.requireAuth();
                const user = await DB.getUser();
                if (user) {
                    currentUser = user;
                    // Buscar dados completos do corretor
                    currentCorretor = await DB.getCorretorByEmail(user.email);
                    console.log('✅ Usuário autenticado:', currentCorretor?.nome || user.email);
                }
            } catch (error) {
                console.warn('⚠️ Erro na autenticação:', error);
            }
            
            // Carrega imóveis independente de autenticação
            await carregarImoveis();
            configurarEventos();
            configurarDataMinima();
        });

        // ===== CARREGAR IMÓVEIS =====
        async function carregarImoveis() {
            try {
                showLoading(true);
                imoveisCache = await DB.listImoveis(); // TODOS os imóveis
                console.log(`✅ ${imoveisCache.length} imóveis carregados`);
            } catch (error) {
                console.error('❌ Erro ao carregar imóveis:', error);
                showToast('Erro ao carregar imóveis', 'error');
            } finally {
                showLoading(false);
            }
        }

        // ===== CONFIGURAR EVENTOS =====
        function configurarEventos() {
            const btnLimpar = document.getElementById('btnLimpar');
            const btnWhatsApp = document.getElementById('btnWhatsApp');
            const formVisita = document.getElementById('formVisita');

            // Botões
            btnLimpar.addEventListener('click', limparFormulario);
            btnWhatsApp.addEventListener('click', enviarWhatsApp);

            // Formulário
            formVisita.addEventListener('submit', salvarVisita);

            // Fechar dropdown ao clicar fora
            document.addEventListener('click', function(e) {
                const dropdown = document.getElementById('autocompleteDropdown');
                const input = document.getElementById('autocompleteInput');
                
                if(dropdown && input && !dropdown.contains(e.target) && e.target !== input) {
                    fecharDropdown();
                }
            });
        }

        // ===== CONFIGURAR DATA MÍNIMA (HOJE) =====
        function configurarDataMinima() {
            const dataInput = document.getElementById('dataVisita');
            const hoje = new Date().toISOString().split('T')[0];
            dataInput.setAttribute('min', hoje);
            dataInput.value = hoje;
        }

        // ===== AUTOCOMPLETE =====
        let autocompleteTimeout = null;

        function handleAutocompleteInput() {
            const input = document.getElementById('autocompleteInput');
            const clearBtn = document.getElementById('clearBtn');
            const searchTerm = input.value.trim();
            
            // Mostrar/ocultar botão de limpar
            clearBtn.style.display = searchTerm ? 'block' : 'none';
            
            // Debounce: aguarda 300ms após parar de digitar
            clearTimeout(autocompleteTimeout);
            
            if(searchTerm.length < 2) {
                fecharDropdown();
                atualizarHint('Digite pelo menos 2 caracteres para buscar');
                return;
            }
            
            atualizarHint('Buscando...');
            
            autocompleteTimeout = setTimeout(() => {
                buscarEMostrarResultados(searchTerm);
            }, 300);
        }

        function handleAutocompleteFocus() {
            const searchTerm = document.getElementById('autocompleteInput').value.trim();
            if(searchTerm.length >= 2) {
                buscarEMostrarResultados(searchTerm);
            }
        }

        function buscarEMostrarResultados(searchTerm) {
            const termUpper = searchTerm.toUpperCase();
            
            // Filtrar por código OU endereço
            const filtered = imoveisCache.filter(i => {
                const codigo = (i.code || '').toUpperCase();
                const endereco = (i.address || '').toUpperCase();
                return codigo.includes(termUpper) || endereco.includes(termUpper);
            });
            
            renderizarResultados(filtered, searchTerm);
        }

        function renderizarResultados(imoveis, searchTerm) {
            const dropdown = document.getElementById('autocompleteDropdown');
            const results = document.getElementById('autocompleteResults');
            
            if(imoveis.length === 0) {
                results.innerHTML = `
                    <div class="autocomplete-empty">
                        😕 Nenhum imóvel encontrado para "${searchTerm}"<br>
                        <small style="color: #9e9e9e;">Tente buscar por código (ex: AC3964) ou endereço</small>
                    </div>
                `;
                dropdown.style.display = 'block';
                atualizarHint('Nenhum resultado encontrado');
                return;
            }
            
            // Separar por status (apenas disponíveis para visita)
            const disponiveis = imoveis.filter(i => {
                const status = (i.status || '').toLowerCase();
                return status === 'disponível' || status === 'disponivel';
            });
            const outros = imoveis.filter(i => {
                const status = (i.status || '').toLowerCase();
                return status !== 'disponível' && status !== 'disponivel';
            });
            
            let html = '';
            
            // Disponíveis
            if(disponiveis.length > 0) {
                html += `<div class="autocomplete-group">✓ Disponíveis para Visita (${disponiveis.length})</div>`;
                disponiveis.forEach(i => {
                    html += criarItemHTML(i, searchTerm);
                });
            }
            
            // Outros
            if(outros.length > 0) {
                html += `<div class="autocomplete-group">⚠ Outros Status (${outros.length})</div>`;
                outros.forEach(i => {
                    html += criarItemHTML(i, searchTerm);
                });
            }
            
            results.innerHTML = html;
            dropdown.style.display = 'block';
            atualizarHint(`${imoveis.length} imóvel(is) encontrado(s)`);
        }

        function criarItemHTML(imovel, searchTerm) {
            const statusClass = (imovel.status || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            
            // Destacar termo buscado
            const codigoHighlighted = destacarTermo(imovel.code, searchTerm);
            const enderecoHighlighted = destacarTermo(imovel.address, searchTerm);
            
            return `
                <div class="autocomplete-item" onclick='selecionarImovel(${JSON.stringify(imovel).replace(/'/g, "&apos;")})'>
                    <div class="autocomplete-item-code">${codigoHighlighted}</div>
                    <div class="autocomplete-item-address">${enderecoHighlighted}</div>
                    <span class="autocomplete-item-status ${statusClass}">${imovel.status}</span>
                </div>
            `;
        }

        function destacarTermo(texto, termo) {
            if(!termo) return texto;
            const regex = new RegExp(`(${termo})`, 'gi');
            return texto.replace(regex, '<span class="highlight">$1</span>');
        }

        function selecionarImovel(imovel) {
            imovelSelecionado = imovel;
            
            // Preencher campos
            document.getElementById('autocompleteInput').value = `${imovel.code} — ${imovel.address.substring(0, 50)}${imovel.address.length > 50 ? '...' : ''}`;
            document.getElementById('imovelCodigo').value = imovel.code;
            
            // Mostrar informações do imóvel
            const infoDiv = document.getElementById('imovelInfo');
            infoDiv.innerHTML = `
                <div class="imovel-info-row">
                    <span class="imovel-info-label">Código:</span>
                    <span class="imovel-info-value">${imovel.code}</span>
                </div>
                <div class="imovel-info-row">
                    <span class="imovel-info-label">Status:</span>
                    <span class="imovel-info-value">${imovel.status}</span>
                </div>
                <div class="imovel-info-row">
                    <span class="imovel-info-label">Captador:</span>
                    <span class="imovel-info-value">${imovel.captador || 'N/A'}</span>
                </div>
                <div class="imovel-info-row">
                    <span class="imovel-info-label">Valor:</span>
                    <span class="imovel-info-value">${formatarMoeda(imovel.price)}</span>
                </div>
            `;
            infoDiv.classList.add('show');
            
            // Fechar dropdown
            fecharDropdown();
            
            // Focar próximo campo
            document.getElementById('dataVisita').focus();
        }

        function limparAutocomplete() {
            document.getElementById('autocompleteInput').value = '';
            document.getElementById('imovelCodigo').value = '';
            document.getElementById('clearBtn').style.display = 'none';
            document.getElementById('imovelInfo').classList.remove('show');
            imovelSelecionado = null;
            fecharDropdown();
            atualizarHint('Digite pelo menos 2 caracteres para buscar');
            document.getElementById('autocompleteInput').focus();
        }

        function fecharDropdown() {
            document.getElementById('autocompleteDropdown').style.display = 'none';
        }

        function atualizarHint(texto) {
            document.getElementById('autocompleteHint').textContent = texto;
        }

        // ===== SALVAR VISITA =====
        async function salvarVisita(e) {
            e.preventDefault();

            // Verificar se está autenticado antes de salvar
            if (!currentUser) {
                showToast('Você precisa estar logado para registrar uma visita', 'error');
                window.location.href = 'index.html?redirect=RegistrarVisita.html';
                return;
            }

            if (!imovelSelecionado) {
                showToast('Selecione um imóvel da lista', 'error');
                return;
            }

            // Validar campos obrigatórios
            const clienteNome = document.getElementById('clienteNome').value.trim();
            if (!clienteNome) {
                showToast('Preencha o nome do cliente', 'error');
                document.getElementById('clienteNome').focus();
                return;
            }

            if (!currentCorretor || !currentCorretor.nome) {
                showToast('Erro: Corretor não identificado. Faça login novamente.', 'error');
                return;
            }

            try {
                showLoading(true);

                const payload = {
                    corretor_nome: currentCorretor.nome,
                    corretor_id: currentCorretor.id || null,
                    cliente_nome: clienteNome,
                    cliente_telefone: null,
                    imovel_codigo: imovelSelecionado.code,
                    data_visita: document.getElementById('dataVisita').value,
                    horario_visita: document.getElementById('horarioVisita').value,
                    observacoes: document.getElementById('observacoes').value.trim() || null,
                    created_by: currentUser.email
                };

                visitaSalva = await DB.addVisita(payload);
                
                showToast('Visita registrada com sucesso!', 'success');
                
                // Mostrar botão WhatsApp
                document.getElementById('btnWhatsApp').classList.add('show');
                
                // Desabilitar edição
                document.getElementById('btnSalvar').disabled = true;

            } catch (error) {
                console.error('Erro ao salvar visita:', error);
                showToast(error.message || 'Erro ao salvar visita', 'error');
            } finally {
                showLoading(false);
            }
        }

        // ===== WHATSAPP =====
        async function enviarWhatsApp() {
            if (!visitaSalva) {
                showToast('Nenhuma visita para enviar', 'error');
                return;
            }

            try {
                showLoading(true);

                // Buscar número do gerente
                const whatsapp = await DB.getWhatsAppGerente();
                const numero = whatsapp.numero;

                // Montar mensagem
                const dataFormatada = formatarDataBR(visitaSalva.data_visita);
                const horarioFormatado = formatarHorario(visitaSalva.horario_visita);

                const mensagem = `*SOLICITAÇÃO DE VISITA*

*Corretor:* ${visitaSalva.corretor_nome}
*Cliente:* ${visitaSalva.cliente_nome}

*Imóvel:* ${visitaSalva.imovel_codigo}
*Endereço:* ${visitaSalva.imovel_endereco}
*Valor:* ${formatarMoeda(visitaSalva.imovel_valor)}

*Data:* ${dataFormatada}
*Horário:* ${horarioFormatado}
${visitaSalva.observacoes ? `\n*Observações:* ${visitaSalva.observacoes}\n` : ''}
_Mensagem gerada automaticamente pelo Sistema de Visitas_`;

                // Criar link do WhatsApp
                const mensagemEncoded = encodeURIComponent(mensagem);
                const linkWhatsApp = `https://wa.me/${numero}?text=${mensagemEncoded}`;

                // Atualizar status de mensagem enviada
                await DB.updateVisita(visitaSalva.id, {
                    mensagem_enviada: true,
                    numero_destino: numero
                });

                // Abrir WhatsApp
                window.open(linkWhatsApp, '_blank');

                showToast('Abrindo WhatsApp...', 'success');

                // Aguardar 2s e redirecionar para histórico
                setTimeout(() => {
                    window.location.href = 'Visitas.html';
                }, 2000);

            } catch (error) {
                console.error('Erro ao enviar WhatsApp:', error);
                showToast('Erro ao enviar WhatsApp', 'error');
            } finally {
                showLoading(false);
            }
        }

        // ===== LIMPAR FORMULÁRIO =====
        function limparFormulario() {
            document.getElementById('formVisita').reset();
            limparAutocomplete();
            imovelSelecionado = null;
            visitaSalva = null;
            document.getElementById('btnSalvar').disabled = false;
            document.getElementById('btnWhatsApp').classList.remove('show');
            configurarDataMinima();
        }

        // ===== UTILITÁRIOS =====
        function showLoading(show) {
            const loading = document.getElementById('loading');
            if (show) {
                loading.classList.add('show');
            } else {
                loading.classList.remove('show');
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function formatarMoeda(valor) {
            if (!valor) return 'R$ 0,00';
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(valor);
        }

        function formatarDataBR(dataISO) {
            if (!dataISO) return '';
            const [ano, mes, dia] = dataISO.split('-');
            return `${dia}/${mes}/${ano}`;
        }

        function formatarHorario(horario) {
            if (!horario) return '';
            return horario.substring(0, 5); // HH:MM
        }

        // ===== PWA: SERVICE WORKER =====
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('✅ Service Worker registrado'))
                    .catch(err => console.error('❌ Erro ao registrar Service Worker:', err));
            });
        }
    </script>
</body>
</html>
