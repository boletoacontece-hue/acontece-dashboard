<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2c6e2e">
    <title>Gerenciar Visitas | Acontece Imóveis</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2c6e2e;
            --primary-dark: #1a4d1b;
            --success: #27ae60;
            --danger: #c62828;
            --warning: #f39c12;
            --info: #2c6e2e;
            --dark: #212121;
            --light: #f4f6f4;
            --borda: #e0e0e0;
            --white: #ffffff;
            --gray: #9e9e9e;
            --gray-light: #bdc3c7;
            --shadow: rgba(0, 0, 0, 0.08);
            --radius: 10px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--light);
            min-height: 100vh;
            color: var(--dark);
            padding: 24px;
            padding-bottom: 80px;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            padding: 20px;
            box-shadow: 0 2px 10px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .header-title {
            display: flex;
            align-items: center;
        }

        .header-title h1 {
            font-size: 24px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn-header {
            background: var(--white);
            color: var(--primary);
            border: none;
            padding: 10px 16px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-header:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        /* ===== FILTROS ===== */
        .filtros {
            background: var(--white);
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 20px;
        }

        .filtros-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .filtro-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filtro-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray);
            text-transform: uppercase;
        }

        .filtro-control {
            padding: 10px 12px;
            border: 2px solid var(--light);
            border-radius: var(--radius);
            font-size: 14px;
            transition: all 0.3s;
        }

        .filtro-control:focus {
            outline: none;
            border-color: var(--primary);
        }

        .filtros-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-filtro {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-filtro-primary {
            background: var(--primary);
            color: var(--white);
        }

        .btn-filtro-primary:hover {
            background: var(--primary-dark);
        }

        .btn-filtro-secondary {
            background: var(--light);
            color: var(--dark);
        }

        /* ===== ESTATÍSTICAS (KPIs) ===== */
        .kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .kpi-card {
            background: var(--white);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: 0 2px 8px var(--shadow);
            transition: all 0.3s;
            text-align: center;
        }

        .kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .kpi-card h3 {
            font-size: 13px;
            color: var(--gray);
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kpi-card .kpi-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--dark);
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ===== LISTA DE VISITAS ===== */
        .visitas-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .visitas-header h2 {
            font-size: 20px;
            color: var(--dark);
        }

        .visitas-count {
            font-size: 14px;
            color: var(--gray);
            background: var(--light);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .visitas-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .visita-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: 0 2px 8px var(--shadow);
            transition: all 0.3s;
            border-left: 4px solid var(--primary);
        }

        .visita-card:hover {
            box-shadow: 0 4px 16px var(--shadow);
            transform: translateX(4px);
        }

        .visita-card.pendente {
            border-left-color: var(--warning);
        }

        .visita-card.confirmada {
            border-left-color: var(--info);
        }

        .visita-card.realizada {
            border-left-color: var(--success);
        }

        .visita-card.cancelada {
            border-left-color: var(--danger);
            opacity: 0.7;
        }

        .visita-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .visita-info-principal h3 {
            font-size: 18px;
            color: var(--dark);
            margin-bottom: 4px;
        }

        .visita-cliente {
            font-size: 14px;
            color: var(--gray);
            margin-bottom: 2px;
        }

        .visita-corretor {
            font-size: 13px;
            color: var(--primary);
            font-weight: 600;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pendente {
            background: #fff3cd;
            color: #856404;
        }

        .status-confirmada {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-realizada {
            background: #d4edda;
            color: #155724;
        }

        .status-cancelada {
            background: #f8d7da;
            color: #721c24;
        }

        .status-nao_compareceu {
            background: #e2e3e5;
            color: #383d41;
        }

        .visita-body {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .visita-detail {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .visita-detail i {
            font-size: 18px;
            color: var(--primary);
            width: 24px;
            text-align: center;
        }

        .visita-detail-content span {
            display: block;
            font-size: 12px;
            color: var(--gray);
        }

        .visita-detail-content strong {
            display: block;
            font-size: 14px;
            color: var(--dark);
            margin-top: 2px;
        }

        .visita-observacoes {
            background: var(--light);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            color: var(--dark);
            font-style: italic;
            margin-bottom: 12px;
        }

        .visita-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-action-whatsapp {
            background: #25D366;
            color: var(--white);
        }

        .btn-action-whatsapp:hover {
            background: #128C7E;
        }

        .btn-action-editar {
            background: var(--primary);
            color: var(--white);
        }

        .btn-action-editar:hover {
            background: var(--primary-dark);
        }

        .btn-action-cancelar {
            background: var(--danger);
            color: var(--white);
        }

        .btn-action-cancelar:hover {
            background: #c0392b;
        }

        .btn-action-confirmar {
            background: var(--success);
            color: var(--white);
        }

        .btn-action-confirmar:hover {
            background: #229954;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--white);
            border-radius: var(--radius);
        }

        .empty-state i {
            font-size: 64px;
            color: var(--gray-light);
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 20px;
            color: var(--dark);
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 14px;
            color: var(--gray);
            margin-bottom: 24px;
        }

        /* ===== LOADING ===== */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .loading.show {
            display: flex;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark);
            color: var(--white);
            padding: 16px 24px;
            border-radius: var(--radius);
            box-shadow: 0 4px 20px var(--shadow);
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 9998;
            max-width: 90%;
        }

        .toast.show {
            display: flex;
            animation: slideUp 0.3s ease-out;
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger);
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            .header-title h1 {
                font-size: 18px;
            }

            .header-actions .btn-header span {
                display: none;
            }

            .kpis {
                grid-template-columns: repeat(2, 1fr);
            }

            .filtros-grid {
                grid-template-columns: 1fr;
            }

            .visita-body {
                grid-template-columns: 1fr;
            }

            .visita-actions {
                flex-direction: column;
            }

            .btn-action {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- LOADING -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Mensagem</span>
    </div>

    <!-- HEADER -->
    <div class="header">
        <div class="header-content">
            <div class="header-top">
                <div class="header-title">
                    <h1>Gerenciar Visitas</h1>
                </div>
                <div class="header-actions">
                    <a href="RegistrarVisita.html" class="btn-header">
                        Nova Visita
                    </a>
                    <a href="Dash5.html" class="btn-header">
                        Voltar
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- CONTAINER -->
    <div class="container">
        <!-- KPIs -->
        <div class="kpis">
            <div class="kpi-card">
                <h3>Total de Visitas</h3>
                <div class="kpi-value" id="kpiTotal">0</div>
            </div>
            <div class="kpi-card">
                <h3>Pendentes</h3>
                <div class="kpi-value" id="kpiPendentes">0</div>
            </div>
            <div class="kpi-card">
                <h3>Realizadas</h3>
                <div class="kpi-value" id="kpiRealizadas">0</div>
            </div>
            <div class="kpi-card">
                <h3>Hoje</h3>
                <div class="kpi-value" id="kpiHoje">0</div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="filtros">
            <div class="filtros-grid">
                <div class="filtro-group">
                    <label>Status</label>
                    <select class="filtro-control" id="filtroStatus">
                        <option value="">Todos</option>
                        <option value="pendente">Pendente</option>
                        <option value="confirmada">Confirmada</option>
                        <option value="realizada">Realizada</option>
                        <option value="cancelada">Cancelada</option>
                        <option value="nao_compareceu">Não Compareceu</option>
                    </select>
                </div>
                <div class="filtro-group">
                    <label>Data Início</label>
                    <input type="date" class="filtro-control" id="filtroDataInicio">
                </div>
                <div class="filtro-group">
                    <label>Data Fim</label>
                    <input type="date" class="filtro-control" id="filtroDataFim">
                </div>
                <div class="filtro-group">
                    <label>Corretor</label>
                    <input type="text" class="filtro-control" id="filtroCorretor" placeholder="Nome do corretor">
                </div>
            </div>
            <div class="filtros-actions">
                <button class="btn-filtro btn-filtro-primary" onclick="aplicarFiltros()">
                    <i class="fas fa-filter"></i> Aplicar Filtros
                </button>
                <button class="btn-filtro btn-filtro-secondary" onclick="limparFiltros()">
                    <i class="fas fa-times"></i> Limpar
                </button>
            </div>
        </div>

        <!-- Lista de Visitas -->
        <div class="visitas-header">
            <h2>Lista de Visitas</h2>
            <span class="visitas-count" id="visitasCount">0 visitas</span>
        </div>

        <div class="visitas-list" id="visitasList">
            <!-- Será preenchido via JS -->
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db-supabase.js"></script>
    <script>
        // ===== VARIÁVEIS GLOBAIS =====
        let visitasCache = [];
        let visitasFiltradas = [];
        let currentUser = null;
        let userRole = null; // 'admin' ou 'corretor'
        let isAdmin = false;

        // ===== INICIALIZAÇÃO =====
        window.addEventListener('DOMContentLoaded', async () => {
            await verificarAutenticacao();
            await verificarRole();
            await carregarVisitas();
            configurarDatasPadrao();
            atualizarInterfacePorRole();
        });

        // ===== AUTENTICAÇÃO =====
        async function verificarAutenticacao() {
            const user = await DB.getUser();
            if (!user) {
                window.location.href = 'index.html?redirect=Visitas.html';
                return;
            }
            currentUser = user;
        }

        // ===== VERIFICAR ROLE DO USUÁRIO =====
        async function verificarRole() {
            try {
                const roleInfo = await DB.getCurrentUserRole();
                if (roleInfo) {
                    userRole = roleInfo.role;
                    isAdmin = roleInfo.isAdmin;
                    console.log(`✅ Usuário: ${roleInfo.name} | Role: ${roleInfo.role}`);
                } else {
                    // Fallback: se não encontrar corretor, assume que é corretor comum
                    userRole = 'corretor';
                    isAdmin = false;
                    console.warn('⚠️ Role não encontrado, assumindo corretor comum');
                }
            } catch (error) {
                console.error('Erro ao verificar role:', error);
                userRole = 'corretor';
                isAdmin = false;
            }
        }

        // ===== ATUALIZAR INTERFACE POR ROLE =====
        function atualizarInterfacePorRole() {
            const headerTitle = document.querySelector('.header-title');
            if (headerTitle && isAdmin) {
                // Adicionar badge de admin no título
                const badge = document.createElement('span');
                badge.className = 'admin-badge';
                badge.textContent = 'ADMIN';
                badge.style.cssText = `
                    background: #f44336;
                    color: white;
                    padding: 2px 8px;
                    border-radius: 4px;
                    font-size: 10px;
                    margin-left: 8px;
                    vertical-align: middle;
                `;
                headerTitle.appendChild(badge);
            }
            
            // Log para debug
            console.log(`👤 Modo: ${isAdmin ? 'ADMIN (vê todas as visitas)' : 'CORRETOR (vê apenas suas visitas)'}`);
        }

        // ===== CARREGAR VISITAS =====
        async function carregarVisitas() {
            try {
                showLoading(true);
                visitasCache = await DB.listVisitas();
                visitasFiltradas = [...visitasCache];
                console.log(`✅ ${visitasCache.length} visitas carregadas`);
                renderizar();
            } catch (error) {
                console.error('Erro ao carregar visitas:', error);
                showToast('Erro ao carregar visitas', 'error');
            } finally {
                showLoading(false);
            }
        }

        // ===== RENDERIZAÇÃO =====
        function renderizar() {
            renderizarKPIs();
            renderizarLista();
        }

        function renderizarKPIs() {
            const total = visitasFiltradas.length;
            const pendentes = visitasFiltradas.filter(v => v.status === 'pendente').length;
            const realizadas = visitasFiltradas.filter(v => v.status === 'realizada').length;
            
            const hoje = new Date().toISOString().split('T')[0];
            const visitasHoje = visitasFiltradas.filter(v => v.data_visita === hoje).length;

            document.getElementById('kpiTotal').textContent = total;
            document.getElementById('kpiPendentes').textContent = pendentes;
            document.getElementById('kpiRealizadas').textContent = realizadas;
            document.getElementById('kpiHoje').textContent = visitasHoje;
        }

        function renderizarLista() {
            const container = document.getElementById('visitasList');
            const count = document.getElementById('visitasCount');

            count.textContent = `${visitasFiltradas.length} visita${visitasFiltradas.length !== 1 ? 's' : ''}`;

            if (visitasFiltradas.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-calendar-times"></i>
                        <h3>Nenhuma visita encontrada</h3>
                        <p>Não há visitas com os filtros aplicados.</p>
                        <a href="RegistrarVisita.html" class="btn-header">
                            <i class="fas fa-plus"></i>
                            Registrar Nova Visita
                        </a>
                    </div>
                `;
                return;
            }

            container.innerHTML = visitasFiltradas
                .sort((a, b) => {
                    // Ordenar por data descendente
                    if (a.data_visita !== b.data_visita) {
                        return b.data_visita.localeCompare(a.data_visita);
                    }
                    return b.horario_visita.localeCompare(a.horario_visita);
                })
                .map(visita => criarCardHTML(visita))
                .join('');
        }

        function criarCardHTML(visita) {
            const dataFormatada = formatarDataBR(visita.data_visita);
            const horarioFormatado = formatarHorario(visita.horario_visita);
            const valorFormatado = formatarMoeda(visita.imovel_valor);

            // Ações disponíveis
            let acoesHTML = '';
            
            // WhatsApp (sempre disponível)
            acoesHTML += `<button class="btn-action btn-action-whatsapp" onclick='reenviarWhatsApp(${JSON.stringify(visita)})'>
                <i class="fab fa-whatsapp"></i> WhatsApp
            </button>`;

            // Confirmar (se pendente)
            if (visita.status === 'pendente') {
                acoesHTML += `<button class="btn-action btn-action-confirmar" onclick="alterarStatus('${visita.id}', 'confirmada')">
                    <i class="fas fa-check"></i> Confirmar
                </button>`;
            }

            // Cancelar (se não for cancelada ou realizada)
            if (visita.status !== 'cancelada' && visita.status !== 'realizada') {
                acoesHTML += `<button class="btn-action btn-action-cancelar" onclick="alterarStatus('${visita.id}', 'cancelada')">
                    <i class="fas fa-times"></i> Cancelar
                </button>`;
            }

            return `
                <div class="visita-card ${visita.status}">
                    <div class="visita-header">
                        <div class="visita-info-principal">
                            <h3>${visita.imovel_codigo} - ${visita.imovel_endereco}</h3>
                            <div class="visita-cliente">
                                <i class="fas fa-user"></i> Cliente: ${visita.cliente_nome}
                                ${visita.cliente_telefone ? `| <i class="fas fa-phone"></i> ${visita.cliente_telefone}` : ''}
                            </div>
                            <div class="visita-corretor">
                                <i class="fas fa-user-tie"></i> Corretor: ${visita.corretor_nome}
                            </div>
                        </div>
                        <span class="status-badge status-${visita.status}">${traduzirStatus(visita.status)}</span>
                    </div>
                    <div class="visita-body">
                        <div class="visita-detail">
                            <i class="fas fa-calendar"></i>
                            <div class="visita-detail-content">
                                <span>Data da Visita</span>
                                <strong>${dataFormatada}</strong>
                            </div>
                        </div>
                        <div class="visita-detail">
                            <i class="fas fa-clock"></i>
                            <div class="visita-detail-content">
                                <span>Horário</span>
                                <strong>${horarioFormatado}</strong>
                            </div>
                        </div>
                        <div class="visita-detail">
                            <i class="fas fa-dollar-sign"></i>
                            <div class="visita-detail-content">
                                <span>Valor do Imóvel</span>
                                <strong>${valorFormatado}</strong>
                            </div>
                        </div>
                        <div class="visita-detail">
                            <i class="fas fa-user-tag"></i>
                            <div class="visita-detail-content">
                                <span>Captador</span>
                                <strong>${visita.imovel_captador || 'N/A'}</strong>
                            </div>
                        </div>
                    </div>
                    ${visita.observacoes ? `
                        <div class="visita-observacoes">
                            <strong>Observações:</strong> ${visita.observacoes}
                        </div>
                    ` : ''}
                    <div class="visita-actions">
                        ${acoesHTML}
                    </div>
                </div>
            `;
        }

        // ===== FILTROS =====
        function configurarDatasPadrao() {
            const hoje = new Date();
            const primeiroDia = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
            
            document.getElementById('filtroDataInicio').value = primeiroDia.toISOString().split('T')[0];
            document.getElementById('filtroDataFim').value = hoje.toISOString().split('T')[0];
        }

        function aplicarFiltros() {
            const status = document.getElementById('filtroStatus').value;
            const dataInicio = document.getElementById('filtroDataInicio').value;
            const dataFim = document.getElementById('filtroDataFim').value;
            const corretor = document.getElementById('filtroCorretor').value.toLowerCase().trim();

            visitasFiltradas = visitasCache.filter(visita => {
                if (status && visita.status !== status) return false;
                if (dataInicio && visita.data_visita < dataInicio) return false;
                if (dataFim && visita.data_visita > dataFim) return false;
                if (corretor && !visita.corretor_nome.toLowerCase().includes(corretor)) return false;
                return true;
            });

            renderizar();
        }

        function limparFiltros() {
            document.getElementById('filtroStatus').value = '';
            document.getElementById('filtroCorretor').value = '';
            configurarDatasPadrao();
            visitasFiltradas = [...visitasCache];
            renderizar();
        }

        // ===== AÇÕES =====
        async function alterarStatus(id, novoStatus) {
            const confirmMsg = novoStatus === 'cancelada' 
                ? 'Tem certeza que deseja cancelar esta visita?'
                : 'Confirmar esta visita?';
            
            if (!confirm(confirmMsg)) return;

            try {
                showLoading(true);
                await DB.updateVisita(id, { status: novoStatus });
                showToast(`Visita ${traduzirStatus(novoStatus).toLowerCase()}!`, 'success');
                await carregarVisitas();
            } catch (error) {
                console.error('Erro ao alterar status:', error);
                showToast('Erro ao alterar status', 'error');
            } finally {
                showLoading(false);
            }
        }

        async function reenviarWhatsApp(visita) {
            try {
                showLoading(true);

                const whatsapp = await DB.getWhatsAppGerente();
                const numero = whatsapp.numero;

                const dataFormatada = formatarDataBR(visita.data_visita);
                const horarioFormatado = formatarHorario(visita.horario_visita);

                const mensagem = `🏠 *Solicitação de Visita*

👤 *Corretor:* ${visita.corretor_nome}

👥 *Cliente:* ${visita.cliente_nome}
${visita.cliente_telefone ? `📞 *Telefone:* ${visita.cliente_telefone}` : ''}

🏡 *Imóvel:* ${visita.imovel_codigo}
📍 *Endereço:* ${visita.imovel_endereco}
💰 *Valor:* ${formatarMoeda(visita.imovel_valor)}

📅 *Data:* ${dataFormatada}
🕐 *Horário:* ${horarioFormatado}

${visita.observacoes ? `📝 *Observações:* ${visita.observacoes}` : ''}

_Mensagem enviada pelo Sistema de Visitas_`;

                const mensagemEncoded = encodeURIComponent(mensagem);
                const linkWhatsApp = `https://wa.me/${numero}?text=${mensagemEncoded}`;

                window.open(linkWhatsApp, '_blank');
                showToast('Abrindo WhatsApp...', 'success');

            } catch (error) {
                console.error('Erro ao enviar WhatsApp:', error);
                showToast('Erro ao enviar WhatsApp', 'error');
            } finally {
                showLoading(false);
            }
        }

        // ===== UTILITÁRIOS =====
        function traduzirStatus(status) {
            const traducoes = {
                'pendente': 'Pendente',
                'confirmada': 'Confirmada',
                'realizada': 'Realizada',
                'cancelada': 'Cancelada',
                'nao_compareceu': 'Não Compareceu'
            };
            return traducoes[status] || status;
        }

        function formatarDataBR(dataISO) {
            if (!dataISO) return '';
            const [ano, mes, dia] = dataISO.split('-');
            return `${dia}/${mes}/${ano}`;
        }

        function formatarHorario(horario) {
            if (!horario) return '';
            return horario.substring(0, 5);
        }

        function formatarMoeda(valor) {
            if (!valor) return 'R$ 0,00';
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(valor);
        }

        function showLoading(show) {
            const loading = document.getElementById('loading');
            if (show) {
                loading.classList.add('show');
            } else {
                loading.classList.remove('show');
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
