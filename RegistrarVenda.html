<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar Venda - Acontece Imobiliária</title>
<style>
    :root{--verde:#2c6e2e;--verde-escuro:#1a4d1b;--borda:#e0e0e0;--fundo:#f4f6f4;
          --erro:#c62828;--sucesso:#2e7d32;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
         background:var(--fundo);color:#212121;min-height:100vh;padding:24px;}
    .wrap{max-width:860px;margin:0 auto;}
    .topbar{background:linear-gradient(135deg,var(--verde-escuro) 0%,var(--verde) 100%);
            border-radius:16px 16px 0 0;padding:24px 32px;color:#fff;
            display:flex;align-items:center;gap:16px;}
    .topbar img{height:42px;filter:brightness(0) invert(1);}
    .topbar h1{font-size:21px;font-weight:700;}
    .topbar p{font-size:13px;opacity:.85;margin-top:2px;}
    .topbar .right{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:13px;}
    .topbar .sair{background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px 14px;
                  border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;}
    .topbar .sair:hover{background:rgba(255,255,255,.28);}
    .card{background:#fff;border-radius:0 0 16px 16px;box-shadow:0 12px 40px rgba(0,0,0,.08);padding:32px;}
    .form-group{margin-bottom:20px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
    @media(max-width:600px){.form-row{grid-template-columns:1fr;}}
    .form-label{display:block;font-size:13px;font-weight:600;color:#424242;margin-bottom:7px;}
    .req{color:var(--erro);}
    .form-input{width:100%;padding:13px 15px;border:2px solid var(--borda);border-radius:10px;
                font-size:15px;background:#fafafa;transition:all .2s;font-family:inherit;}
    .form-input:focus{outline:none;border-color:var(--verde);background:#fff;}
    .form-input:disabled{background:#eee;color:#777;}
    .hint{display:block;color:#9e9e9e;font-size:12px;margin-top:5px;}
    .btn{padding:14px 26px;border:none;border-radius:10px;font-size:15px;font-weight:600;
         cursor:pointer;transition:all .25s;font-family:inherit;}
    .btn-primary{background:var(--verde);color:#fff;}
    .btn-primary:hover{background:var(--verde-escuro);transform:translateY(-2px);box-shadow:0 8px 20px rgba(44,110,46,.3);}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none;}
    .btn-ghost{background:#f0f0f0;color:#424242;}
    .btn-ghost:hover{background:#e4e4e4;}
    .actions{display:flex;gap:12px;justify-content:flex-end;margin-top:8px;border-top:1px solid #f0f0f0;padding-top:22px;}
    .alerta{padding:14px 18px;border-radius:10px;font-size:14px;margin-bottom:22px;display:none;}
    .alerta.show{display:block;animation:slide .3s ease-out;}
    .alerta.ok{background:#e8f5e9;color:var(--sucesso);border-left:4px solid var(--sucesso);}
    .alerta.err{background:#ffebee;color:var(--erro);border-left:4px solid var(--erro);}
    @keyframes slide{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
    .section-title{font-size:13px;font-weight:700;color:var(--verde);text-transform:uppercase;
                   letter-spacing:.6px;margin:6px 0 18px;display:flex;align-items:center;gap:8px;}
    .section-title::after{content:"";flex:1;height:1px;background:#eee;}
    .recentes{margin-top:30px;}
    .recentes h2{font-size:15px;color:#424242;margin-bottom:14px;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{text-align:left;padding:10px;color:#9e9e9e;font-weight:600;border-bottom:2px solid #eee;
       text-transform:uppercase;font-size:11px;letter-spacing:.4px;}
    td{padding:11px 10px;border-bottom:1px solid #f2f2f2;}
    td .cod{color:var(--verde);font-weight:700;}
    .vazio{text-align:center;color:#bdbdbd;padding:26px;}
    .nav{display:flex;gap:10px;margin-bottom:18px;}
    .nav a{font-size:13px;color:var(--verde);text-decoration:none;font-weight:600;
           border:1px solid var(--verde);padding:6px 12px;border-radius:8px;}
    .nav a:hover{background:var(--verde);color:#fff;}
</style>
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <img src="Logo01.png" alt="Acontece" onerror="this.style.display='none'">
        <div>
            <h1>Registrar Venda</h1>
            <p>Vendas — Dashboard de Vendas Acontece</p>
        </div>
        <div class="right">
            <span id="userInfo"></span>
            <button class="sair" onclick="DB.signOut()">Sair</button>
        </div>
    </div>

    <div class="card">
        <div class="nav">
            <a href="Dash5.html">← Dashboard</a>
            <a href="CadastroImovel.html">Cadastrar Imóvel</a>
        </div>

        <div id="alerta" class="alerta"></div>

        <form id="formVenda" autocomplete="off">
            <div class="section-title">Dados da Venda</div>

            <div class="form-group">
                <label class="form-label">Imóvel (código) <span class="req">*</span></label>
                <select id="imovel" class="form-input" required>
                    <option value="">Carregando imóveis...</option>
                </select>
                <span class="hint">Selecione o imóvel vendido. Endereço e captador são preenchidos automaticamente.</span>
            </div>

            <div class="form-group">
                <label class="form-label">Endereço</label>
                <input type="text" id="endereco" class="form-input" disabled>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Captador</label>
                    <input type="text" id="captador" class="form-input" disabled>
                </div>
                <div class="form-group">
                    <label class="form-label">Corretor (vendedor) <span class="req">*</span></label>
                    <select id="corretor" class="form-input" required>
                        <option value="">Selecione o corretor</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Data da Venda <span class="req">*</span></label>
                    <input type="date" id="date" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Valor da Venda (R$) <span class="req">*</span></label>
                    <input type="text" id="valorDisplay" class="form-input" inputmode="numeric" placeholder="Ex: 370.000,00" required>
                    <input type="hidden" id="valor">
                </div>
            </div>

            <div class="form-group" style="max-width:50%;">
                <label class="form-label">Comissão (R$) <span class="req">*</span></label>
                <input type="text" id="comissaoDisplay" class="form-input" inputmode="numeric" placeholder="Ex: 14.800,00" required>
                <input type="hidden" id="comissao">
            </div>

            <div class="actions">
                <button type="button" class="btn btn-ghost" onclick="limpar()">Limpar</button>
                <button type="submit" class="btn btn-primary" id="btnSalvar">Registrar Venda</button>
            </div>
        </form>

        <div class="recentes">
            <h2>Últimas vendas</h2>
            <table>
                <thead><tr><th>Código</th><th>Endereço</th><th>Corretor</th><th>Data</th><th>Valor</th><th>Comissão</th></tr></thead>
                <tbody id="tbodyRecentes"><tr><td colspan="6" class="vazio">Carregando...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="db-supabase.js"></script>
<script>
let imoveisCache = [];

function formatBRL(v){ return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function moedaInput(displayEl, hiddenId){
    let v=displayEl.value.replace(/\D/g,''); const num=v?parseInt(v,10)/100:0;
    document.getElementById(hiddenId).value=num;
    displayEl.value=num.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function alerta(msg,tipo){
    const a=document.getElementById('alerta');
    a.textContent=msg; a.className='alerta show '+(tipo==='ok'?'ok':'err');
    if(tipo==='ok') setTimeout(()=>a.classList.remove('show'),4000);
    a.scrollIntoView({behavior:'smooth',block:'center'});
}
function limpar(){
    document.getElementById('formVenda').reset();
    document.getElementById('valor').value='';
    document.getElementById('comissao').value='';
    document.getElementById('endereco').value='';
    document.getElementById('captador').value='';
    document.getElementById('date').valueAsDate=new Date();
}
function isoParaBR(iso){ if(!iso) return ''; const [a,m,d]=iso.split('-'); return `${d}/${m}/${a}`; }
function mesRef(iso){ if(!iso) return null; const [a,m]=iso.split('-'); return `${a}-${m}`; }

async function carregarImoveis(){
    const sel=document.getElementById('imovel');
    try{
        imoveisCache = await DB.listImoveis();
        sel.innerHTML='<option value="">Selecione o imóvel</option>';
        imoveisCache
            .filter(i => i.status !== 'Vendido')   // prioriza os ainda não vendidos
            .forEach(i => sel.add(new Option(`${i.code} — ${i.address.substring(0,45)}`, i.code)));
        if(sel.options.length===1){
            imoveisCache.forEach(i => sel.add(new Option(`${i.code} — ${i.address.substring(0,45)}`, i.code)));
        }
    }catch(e){ sel.innerHTML='<option value="">Erro ao carregar imóveis</option>'; }
}

function aoSelecionarImovel(){
    const code=document.getElementById('imovel').value;
    const imo=imoveisCache.find(i=>i.code===code);
    document.getElementById('endereco').value = imo ? imo.address : '';
    document.getElementById('captador').value = imo ? (imo.captador||'') : '';
}

async function carregarCorretores(){
    const sel=document.getElementById('corretor');
    try{
        const corretores=await DB.listCorretores();
        sel.innerHTML='<option value="">Selecione o corretor</option>';
        corretores.filter(c=>c.type==='Corretor'||c.type==='Ambos')
            .forEach(c=>sel.add(new Option(c.name,c.name)));
    }catch(e){ /* mantém opção padrão */ }
}

async function renderRecentes(){
    const tb=document.getElementById('tbodyRecentes');
    try{
        const lista=(await DB.listVendas()).slice(0,8);
        if(lista.length===0){ tb.innerHTML='<tr><td colspan="6" class="vazio">Nenhuma venda registrada ainda.</td></tr>'; return; }
        tb.innerHTML=lista.map(v=>`
            <tr>
                <td><span class="cod">${v.code}</span></td>
                <td title="${v.address||''}" style="max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${v.address||'-'}</td>
                <td>${v.corretor||'-'}</td>
                <td>${v.date||'-'}</td>
                <td>${formatBRL(v.value)}</td>
                <td>${formatBRL(v.commission)}</td>
            </tr>`).join('');
    }catch(e){ tb.innerHTML='<tr><td colspan="6" class="vazio">Erro ao carregar vendas.</td></tr>'; }
}

async function salvar(e){
    e.preventDefault();
    const btn=document.getElementById('btnSalvar');
    const code=document.getElementById('imovel').value;
    const endereco=document.getElementById('endereco').value;
    const captador=document.getElementById('captador').value;
    const corretor=document.getElementById('corretor').value;
    const dateIso=document.getElementById('date').value;
    const valor=parseFloat(document.getElementById('valor').value);
    const comissao=parseFloat(document.getElementById('comissao').value);

    if(!code||!corretor||!dateIso||!(valor>0)){
        alerta('Preencha imóvel, corretor, data e valor (maior que zero).','err'); return;
    }
    btn.disabled=true;
    try{
        const { error } = await DB.client.from('vendas').insert({
            imovel_codigo: code, endereco: endereco, captador: captador,
            corretor: corretor, data_venda: dateIso,
            valor: valor, comissao: comissao || 0, mes_ref: mesRef(dateIso)
        });
        if(error) throw error;

        // marca o imóvel como Vendido
        await DB.client.from('imoveis').update({ status:'Vendido' }).eq('codigo', code);

        alerta(`Venda do imóvel ${code} registrada com sucesso!`,'ok');
        limpar();
        await carregarImoveis();
        await renderRecentes();
    }catch(err){
        alerta('Erro ao registrar: '+(err.message||err),'err');
    }finally{ btn.disabled=false; }
}

document.addEventListener('DOMContentLoaded', async function(){
    await DB.requireAuth();
    const user=await DB.getUser();
    if(user) document.getElementById('userInfo').textContent=user.email;
    document.getElementById('date').valueAsDate=new Date();
    document.getElementById('valorDisplay').addEventListener('input',function(){moedaInput(this,'valor');});
    document.getElementById('comissaoDisplay').addEventListener('input',function(){moedaInput(this,'comissao');});
    document.getElementById('imovel').addEventListener('change', aoSelecionarImovel);
    document.getElementById('formVenda').addEventListener('submit', salvar);
    await Promise.all([carregarImoveis(), carregarCorretores(), renderRecentes()]);
});
</script>
</body>
</html>
