<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2B5C2B">
    <title>Acontece Imobiliária — Dashboard</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="Logo01.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Acontece">
</head>
<body style="font-family:-apple-system,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#1a4d1b,#2c6e2e);color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;gap:14px;">
    <img src="Logo01.png" alt="Acontece" style="max-width:160px;height:auto;background:#fff;border-radius:14px;padding:14px" onerror="this.style.display='none'">
    <p style="opacity:.9">Carregando… <a href="login.html" style="color:#fff;text-decoration:underline;">entrar</a></p>

    <!-- Registra o Service Worker ANTES de sair da página (essencial p/ instalar) -->
    <script src="pwa-register.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db-supabase.js"></script>
    <script>
        // Espera ~1,2s para o SW registrar, depois decide o destino pela sessão.
        (async function () {
            let destino = 'login.html';
            try { if (window.DB && await DB.getSession()) destino = 'Dash5.html'; }
            catch (e) { /* sem sessão -> login */ }
            setTimeout(function () { window.location.replace(destino); }, 1200);
        })();
    </script>
</body>
</html>
